<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    {% block title %}
    Dashboard
    {% endblock %}
  </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Admin</a>
      <div class="navbar-nav">
        <a class="nav-link active" href="/">Dashboard</a>
        <a class="nav-link" href="/users">Users</a>
        <a class="nav-link" href="/products">Products</a>
      </div>
    </div>
  </nav>

  {% block content %}
  <div class="container py-4">
    <h3 class="mb-3">Dashboard</h3>
    <div class="row g-3">
      <div class="col-md-4"><div class="card p-3"><h5>Total Users</h5><p class="mb-0">120</p></div></div>
      <div class="col-md-4"><div class="card p-3"><h5>Total Products</h5><p class="mb-0">85</p></div></div>
      <div class="col-md-4"><div class="card p-3"><h5>Total Orders</h5><p class="mb-0">45</p></div></div>
    </div>
  </div>
{% endblock %}
</body>
</html>
