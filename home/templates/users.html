{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between mb-3">
      <h3>Users</h3>
      <button class="btn btn-primary btn-sm">Add User</button>
    </div>
    <table class="table table-bordered bg-white">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody>
      {% for user in users %}
        <tr>
            <td>{{ user.id }} </td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
